      <!-- stethoscope hint -->
      <path d="M28 50 q0 12 12 12 q12 0 12 -12" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
    <text x="116" y="42" fill="#ffffff" font-size="15" font-weight="800">Dr. Nour El-Din</text>
    <text x="116" y="60" fill="#B2EBF2" font-size="11">Cardiologist · 12 yrs exp.</text>
    <g transform="translate(116 70)">
      <text fill="#FFEB3B" font-size="11" font-weight="700">★★★★★</text>
      <text x="78" y="0" fill="#ffffff" font-size="10" font-weight="600">4.9 (312)</text>
    </g>
    <g transform="translate(116 86)">
      <rect width="86" height="22" rx="11" fill="#ffffff"/>
      <text x="43" y="15" text-anchor="middle" fill="#0097A7" font-size="10" font-weight="800">VIDEO CALL</text>
    </g>
    <g transform="translate(208 86)">
      <rect width="60" height="22" rx="11" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff"/>
      <text x="30" y="15" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">In-clinic</text>
    </g>
  </g>

  <!-- pick a date -->
  <text x="20" y="296" fill="#0F2742" font-size="13" font-weight="700">Available slots — Thu, May 8</text>
  <g transform="translate(16 308)" font-size="11" font-weight="600">
    <g><rect width="76" height="36" rx="12" fill="#ffffff" stroke="#E3E8EF"/><text x="38" y="23" text-anchor="middle" fill="#0F2742">10:00</text></g>
    <g transform="translate(84 0)"><rect width="76" height="36" rx="12" fill="#2196F3"/><text x="38" y="23" text-anchor="middle" fill="#ffffff">11:30</text></g>
    <g transform="translate(168 0)"><rect width="76" height="36" rx="12" fill="#ffffff" stroke="#E3E8EF"/><text x="38" y="23" text-anchor="middle" fill="#0F2742">13:00</text></g>
