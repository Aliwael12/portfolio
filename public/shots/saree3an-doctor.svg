<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
  </defs>
  <rect width="360" height="720" rx="28" fill="#F5F7FA"/>

  <rect width="360" height="24" fill="#1976D2"/>
  <text x="16" y="17" fill="#ffffff" font-size="11" font-weight="600">9:41</text>

  <rect y="24" width="360" height="60" fill="url(#hdr)"/>
  <path d="M22 56 l-10 -10 l10 -10" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="42" y="60" fill="#ffffff" font-size="15" font-weight="700">Find a Doctor</text>

  <!-- specialties chips -->
  <g transform="translate(16 100)" font-size="11" font-weight="600">
    <g><rect width="86" height="32" rx="16" fill="#1976D2"/><text x="43" y="20" text-anchor="middle" fill="#ffffff">All</text></g>
    <g transform="translate(94 0)"><rect width="92" height="32" rx="16" fill="#ffffff" stroke="#E3E8EF"/><text x="46" y="20" text-anchor="middle" fill="#0F2742">Cardiology</text></g>
    <g transform="translate(194 0)"><rect width="84" height="32" rx="16" fill="#ffffff" stroke="#E3E8EF"/><text x="42" y="20" text-anchor="middle" fill="#0F2742">Dermat.</text></g>
    <g transform="translate(286 0)"><rect width="60" height="32" rx="16" fill="#ffffff" stroke="#E3E8EF"/><text x="30" y="20" text-anchor="middle" fill="#0F2742">ENT</text></g>
  </g>

  <!-- featured doctor -->
  <g transform="translate(16 152)">
    <rect width="328" height="120" rx="18" fill="url(#hero)"/>
    <!-- avatar -->
    <g transform="translate(20 20)">
      <circle cx="40" cy="40" r="40" fill="#ffffff"/>
      <circle cx="40" cy="34" r="14" fill="#0097A7"/>
