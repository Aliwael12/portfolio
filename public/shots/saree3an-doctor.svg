    <text x="80" y="68" fill="#FFB300" font-size="10" font-weight="700">★ 4.8 · 210 reviews</text>
    <g transform="translate(252 24)">
      <rect width="60" height="32" rx="10" fill="#E3F2FD"/>
      <text x="30" y="21" text-anchor="middle" fill="#1976D2" font-size="11" font-weight="800">Book</text>
    </g>
  </g>

  <g transform="translate(16 480)">
    <rect width="328" height="80" rx="16" fill="#ffffff" stroke="#E3E8EF"/>
    <g transform="translate(16 16)">
      <circle cx="24" cy="24" r="24" fill="#C8E6C9"/>
      <circle cx="24" cy="20" r="9" fill="#2E7D32"/>
      <path d="M8 46 Q8 32 24 32 Q40 32 40 46 Z" fill="#2E7D32"/>
    </g>
    <text x="80" y="36" fill="#0F2742" font-size="13" font-weight="700">Dr. Omar S.</text>
    <text x="80" y="52" fill="#7A8A99" font-size="10">Pediatrics · 15 yrs</text>
    <text x="80" y="68" fill="#FFB300" font-size="10" font-weight="700">★ 4.7 · 480 reviews</text>
    <g transform="translate(252 24)">
      <rect width="60" height="32" rx="10" fill="#E3F2FD"/>
      <text x="30" y="21" text-anchor="middle" fill="#1976D2" font-size="11" font-weight="800">Book</text>
    </g>
