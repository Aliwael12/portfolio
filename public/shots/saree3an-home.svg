<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>

  <!-- phone bg -->
  <rect width="360" height="720" rx="28" fill="#F5F7FA"/>

  <!-- status bar -->
  <rect width="360" height="24" rx="0" fill="#1976D2"/>
  <text x="16" y="17" fill="#ffffff" font-size="11" font-weight="600">9:41</text>
  <g transform="translate(316 9)" fill="#ffffff">
    <rect width="14" height="8" rx="1.5"/>
    <rect x="18" y="2" width="20" height="4" rx="1"/>
  </g>

  <!-- app bar -->
  <rect y="24" width="360" height="92" fill="url(#header)"/>
  <g transform="translate(20 50)">
    <rect width="40" height="40" rx="10" fill="#ffffff"/>
    <rect x="17" y="6" width="6" height="28" rx="2" fill="#2196F3"/>
    <rect x="6" y="17" width="28" height="6" rx="2" fill="#2196F3"/>
  </g>
  <text x="72" y="68" fill="#ffffff" font-size="16" font-weight="700">Sareean Medical</text>
  <text x="72" y="88" fill="#BBDEFB" font-size="11">Hi Ali · Mon, May 7</text>
  <circle cx="332" cy="70" r="14" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="332" cy="70" r="11" fill="none" stroke="#ffffff" stroke-width="1.6"/>
  <path d="M332 64 v6 l4 3" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- search -->
  <g transform="translate(16 132)">
    <rect width="328" height="44" rx="14" fill="#ffffff" stroke="#E3E8EF"/>
    <circle cx="22" cy="22" r="6" fill="none" stroke="#90A4AE" stroke-width="1.6"/>
    <line x1="26" y1="26" x2="31" y2="31" stroke="#90A4AE" stroke-width="1.6" stroke-linecap="round"/>
    <text x="44" y="27" fill="#90A4AE" font-size="13">Search services, doctors, labs…</text>
  </g>

  <!-- promo carousel -->
  <g transform="translate(16 196)">
    <rect width="328" height="110" rx="16" fill="url(#card1)"/>
    <text x="20" y="38" fill="#ffffff" font-size="15" font-weight="700">Free home collection</text>
    <text x="20" y="58" fill="#E3F2FD" font-size="11">Book a lab test · Get results in 24h</text>
    <g transform="translate(20 72)">
      <rect width="92" height="26" rx="13" fill="#ffffff"/>
      <text x="22" y="18" fill="#1565C0" font-size="11" font-weight="700">Book now →</text>
    </g>
    <!-- decorative flask -->
    <g transform="translate(240 18) rotate(-12)" fill="#ffffff" fill-opacity="0.25">
      <rect x="14" y="0" width="14" height="10" rx="2"/>
      <path d="M10 14 L32 14 L40 70 Q40 84 26 84 L16 84 Q2 84 2 70 Z"/>
      <rect x="6" y="56" width="32" height="14" fill="#ffffff" fill-opacity="0.5"/>
    </g>
    <g transform="translate(150 100)" fill="#ffffff">
      <circle cx="0" cy="0" r="3"/>
      <circle cx="10" cy="0" r="3" fill-opacity="0.5"/>
      <circle cx="20" cy="0" r="3" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- section title -->
  <text x="20" y="334" fill="#0F2742" font-size="14" font-weight="700">Services</text>
  <text x="290" y="334" fill="#1976D2" font-size="11" font-weight="600">See all</text>

  <!-- services grid -->
  <g transform="translate(16 348)">
    <!-- Lab -->
    <g>
      <rect width="156" height="92" rx="16" fill="url(#card1)"/>
      <g transform="translate(14 14)" fill="#ffffff">
        <rect x="10" y="0" width="14" height="6" rx="1.5"/>
        <path d="M6 10 L28 10 L34 50 Q34 60 24 60 L10 60 Q0 60 0 50 Z" fill-opacity="0.95"/>
        <rect x="4" y="40" width="26" height="10" fill="#ffffff" fill-opacity="0.4"/>
      </g>
      <text x="72" y="40" fill="#ffffff" font-size="13" font-weight="700">Lab Tests</text>
      <text x="72" y="58" fill="#E3F2FD" font-size="10">Blood · X-Ray · ECG</text>
      <text x="72" y="74" fill="#FFF59D" font-size="10" font-weight="600">From 50 EGP</text>
    </g>
    <!-- Ambulance -->
    <g transform="translate(172 0)">
      <rect width="156" height="92" rx="16" fill="url(#card3)"/>
      <g transform="translate(12 28)" fill="#ffffff">
        <rect x="0" y="6" width="38" height="22" rx="4"/>
        <rect x="38" y="14" width="14" height="14" rx="3"/>
        <rect x="42" y="18" width="6" height="6" fill="#E53935"/>
        <circle cx="12" cy="32" r="5"/>
        <circle cx="40" cy="32" r="5"/>
        <rect x="14" y="12" width="10" height="2" rx="1" fill="#E53935"/>
        <rect x="18" y="8" width="2" height="10" rx="1" fill="#E53935"/>
      </g>
      <text x="72" y="40" fill="#ffffff" font-size="13" font-weight="700">Ambulance</text>
      <text x="72" y="58" fill="#FFCDD2" font-size="10">Live GPS · 24/7</text>
      <g transform="translate(72 66)">
        <circle cx="4" cy="4" r="3" fill="#FFEB3B"/>
        <text x="14" y="8" fill="#FFEB3B" font-size="10" font-weight="700">Emergency SOS</text>
      </g>
    </g>
    <!-- Doctor -->
    <g transform="translate(0 104)">
      <rect width="156" height="92" rx="16" fill="url(#card2)"/>
      <g transform="translate(20 22)" fill="#ffffff">
        <circle cx="14" cy="14" r="10"/>
        <path d="M0 50 Q0 30 14 30 Q28 30 28 50 Z"/>
        <circle cx="32" cy="32" r="8" fill="#ffffff"/>
        <path d="M32 28 v8 M28 32 h8" stroke="#00ACC1" stroke-width="2" stroke-linecap="round"/>
      </g>
      <text x="72" y="40" fill="#ffffff" font-size="13" font-weight="700">Doctors</text>
      <text x="72" y="58" fill="#B2EBF2" font-size="10">+120 specialists</text>
      <text x="72" y="74" fill="#ffffff" font-size="10" font-weight="600">Book in seconds</text>
    </g>
    <!-- History -->
    <g transform="translate(172 104)">
      <rect width="156" height="92" rx="16" fill="url(#card4)"/>
      <g transform="translate(14 18)" fill="#ffffff">
        <rect width="40" height="50" rx="4"/>
        <rect x="6" y="8" width="28" height="3" rx="1.5" fill="#43A047"/>
        <rect x="6" y="16" width="22" height="3" rx="1.5" fill="#43A047"/>
        <rect x="6" y="24" width="28" height="3" rx="1.5" fill="#43A047"/>
        <rect x="6" y="32" width="18" height="3" rx="1.5" fill="#43A047"/>
        <rect x="6" y="40" width="24" height="3" rx="1.5" fill="#43A047"/>
      </g>
      <text x="72" y="40" fill="#ffffff" font-size="13" font-weight="700">History</text>
      <text x="72" y="58" fill="#C8E6C9" font-size="10">All your records</text>
      <text x="72" y="74" fill="#ffffff" font-size="10" font-weight="600">Synced · Secure</text>
    </g>
  </g>

  <!-- recent -->
  <text x="20" y="582" fill="#0F2742" font-size="14" font-weight="700">Recent activity</text>
  <g transform="translate(16 596)">
    <rect width="328" height="56" rx="14" fill="#ffffff" stroke="#E3E8EF"/>
    <g transform="translate(14 14)">
      <rect width="28" height="28" rx="9" fill="#E3F2FD"/>
      <path d="M14 8 v12 M8 14 h12" stroke="#1976D2" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="56" y="30" fill="#0F2742" font-size="12" font-weight="600">Blood test · El Borg Lab</text>
    <text x="56" y="46" fill="#7A8A99" font-size="10">Yesterday · Results ready</text>
    <g transform="translate(280 18)">
      <rect width="36" height="20" rx="10" fill="#E8F5E9"/>
      <text x="6" y="14" fill="#2E7D32" font-size="9" font-weight="700">DONE</text>
    </g>
  </g>

  <!-- bottom nav -->
  <rect x="0" y="664" width="360" height="56" fill="#ffffff" stroke="#E3E8EF"/>
  <g font-size="9" font-weight="600" text-anchor="middle">
    <g transform="translate(45 678)">
      <path d="M0 14 L12 0 L24 14 V24 H0 Z" fill="#2196F3"/>
      <text y="38" fill="#2196F3">Home</text>
    </g>
    <g transform="translate(135 680)">
      <rect x="0" y="0" width="22" height="22" rx="5" fill="none" stroke="#90A4AE" stroke-width="2"/>
      <text x="11" y="36" fill="#90A4AE">Services</text>
    </g>
    <g transform="translate(225 680)">
      <circle cx="11" cy="9" r="6" fill="none" stroke="#90A4AE" stroke-width="2"/>
      <path d="M2 24 Q2 16 11 16 Q20 16 20 24" fill="none" stroke="#90A4AE" stroke-width="2"/>
      <text x="11" y="36" fill="#90A4AE">Profile</text>
    </g>
    <g transform="translate(315 680)">
      <circle cx="11" cy="11" r="9" fill="none" stroke="#90A4AE" stroke-width="2"/>
      <path d="M11 6 v6 l4 2" stroke="#90A4AE" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="11" y="36" fill="#90A4AE">History</text>
    </g>
  </g>
</svg>
